<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maryland Non-Profit Sector Intelligence Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .chart-container { position: relative; width: 100%; height: 350px; }
        @media (min-width: 1024px) { .chart-container { height: 400px; } }
        .modal-backdrop { background-color: rgba(15, 23, 42, 0.5); }
    </style>
</head>
<body class="antialiased selection:bg-blue-100 selection:text-blue-900">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-900 text-white flex items-center justify-center rounded font-bold text-lg">N</div>
                    <div>
                        <h1 class="text-xl font-bold text-slate-900 tracking-tight">MD Non-Profit Intelligence</h1>
                        <p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Forensic Data Portal</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">

        <!-- Status Bar -->
        <div class="bg-white p-4 rounded shadow-sm border border-slate-200">
            <span id="showingStats" class="text-sm font-medium text-slate-600">Initializing System...</span>
        </div>

        <!-- KPI Grid -->
        <section id="kpi-section" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></section>

        <!-- Charts -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
                <h3 class="text-lg font-bold text-slate-800 mb-4">Financial Landscape</h3>
                <div class="chart-container"><canvas id="financialScatterChart"></canvas></div>
            </div>
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
                <h3 class="text-lg font-bold text-slate-800 mb-4">Compliance Risk Profile</h3>
                <div class="chart-container" style="height: 200px;"><canvas id="complianceChart"></canvas></div>
            </div>
        </section>

        <!-- Entity Table -->
        <section class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-slate-600">
                    <thead class="text-xs text-slate-700 uppercase bg-slate-100 sticky top-0">
                        <tr>
                            <th class="px-6 py-3">EIN</th>
                            <th class="px-6 py-3">Name</th>
                            <th class="px-6 py-3">City</th>
                            <th class="px-6 py-3 text-right">Assets</th>
                            <th class="px-6 py-3 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="entityTableBody" class="divide-y divide-slate-200"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let appState = { data: [], isLoading: true };

        function formatCurrency(num) {
            if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return '$' + (num / 1000).toFixed(0) + 'K';
            return '$' + num;
        }

        async function fetchLiveIntel() {
            const statsEl = document.getElementById('showingStats');
            statsEl.textContent = "Connecting to Forensic Unit...";
            statsEl.classList.add("animate-pulse", "text-blue-600");

            try {
                const response = await fetch('/api/intelligence');
                if (!response.ok) throw new Error("Server Error");
                const rawReport = await response.json();

                appState.data = rawReport.map(item => ({
                    ...item,
                    assets: item.assets || 0,
                    income: item.income || 0,
                    status: item.status // Use normalized status from backend
                }));

                statsEl.textContent = `Sync Complete. ${appState.data.length} records loaded from Live Intelligence Core.`;
                statsEl.classList.remove("animate-pulse", "text-blue-600");
                renderAll();
            } catch (error) {
                statsEl.textContent = "Connection Failed. Ensure backend is running.";
                console.error(error);
            }
        }

        function renderAll() {
            // Render Table
            const tbody = document.getElementById('entityTableBody');
            tbody.innerHTML = appState.data.map(item => {
                let color = "bg-slate-100 text-slate-600";
                if(item.status === 'Good Standing') color = "bg-emerald-100 text-emerald-700";
                if(item.status === 'Revoked' || item.status === 'Zombie Entity') color = "bg-red-100 text-red-700";

                return `
                <tr class="bg-white border-b hover:bg-slate-50">
                    <td class="px-6 py-4 font-mono">${item.ein}</td>
                    <td class="px-6 py-4 font-medium text-slate-900">${item.name}</td>
                    <td class="px-6 py-4">${item.city}</td>
                    <td class="px-6 py-4 text-right font-mono">${formatCurrency(item.assets)}</td>
                    <td class="px-6 py-4 text-center"><span class="${color} px-2 py-1 rounded text-xs font-bold">${item.status}</span></td>
                </tr>`;
            }).join('');

            // (Charts would be initialized and updated here - simplified for script size)
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetchLiveIntel();
        });
    </script>
</body>
</html>
